<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LIFF to GAS API</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
    button { width: 80%; padding: 15px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; color: white; }
    .btn-a { background-color: #00B900; }
    .btn-b { background-color: #007BFF; }
    #status { margin: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="status">正在載入系統...</div>
  <button class="btn-a" onclick="handleAction('上班')">上班</button>
  <button class="btn-b" onclick="handleAction('下班')">下班</button>

  <script>
    const LIFF_ID = '2009617105-OfjW8ip2'; // 替換為你的 LIFF ID
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbznx1I7a0rsZ1kJ_6i9vbp2nX7xO4HwEvQMbY7thlz7CiLX3xGZ4D2EeLr4K57CjLzLCQ/exec'; // 替換為上面第 1 步的 URL

    async function initLiff() {
      const statusTag = document.getElementById('status');
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          statusTag.innerText = "系統就緒 (已登入)";
          statusTag.style.color = "green";
        }
      } catch (err) {
        statusTag.innerText = "初始化失敗: " + err.message;
      }
    }

    // 取得地理位置的輔助函式
    function getPosition() {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
        reject(new Error("您的瀏覽器不支援地理位置功能"));
        }
        navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy
        }),
        (err) => reject(new Error("無法取得位置: " + err.message)),
        { enableHighAccuracy: true, timeout: 5000 }
        );
    });
    }

    async function handleAction(actionName) {
    const statusTag = document.getElementById('status');
    statusTag.innerText = "正在取得位置與資料...";

    try {
        // 1. 同時啟動 Line Profile 與 地理位置 抓取
        const [profile, location] = await Promise.all([
        liff.getProfile(),
        getPosition().catch(err => ({ lat: "拒絕授權", lng: "拒絕授權" })) // 若使用者拒絕，仍繼續執行
        ]);

        const payload = {
        userId: profile.userId,
        displayName: profile.displayName,
        action: actionName,
        lat: location.lat,
        lng: location.lng
        };

        // 2. 傳送到 GAS
        statusTag.innerText = "正在寫入試算表...";
        const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (result.result === "success") {
        alert("寫入成功！位置：" + payload.lat + ", " + payload.lng);
        liff.closeWindow();
        } else {
        throw new Error(result.message);
        }

    } catch (err) {
        alert("發生錯誤: " + err.message);
        statusTag.innerText = "傳送失敗";
    }
    }

    window.onload = initLiff;
  </script>
</body>
</html>
